services:
  configsvr:
    image: mongo:7.0
    container_name: nosql-configsvr
    command: ["mongod", "--configsvr", "--replSet", "cfgrs", "--port", "27019", "--bind_ip_all"]
    ports:
      - "27019:27019"
    volumes:
      - ./mongo-data/configdb:/data/db

  shard1:
    image: mongo:7.0
    container_name: nosql-shard1
    command: ["mongod", "--shardsvr", "--replSet", "shard1rs", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27018:27018"
    volumes:
      - ./mongo-data/shard1:/data/db

  shard2:
    image: mongo:7.0
    container_name: nosql-shard2
    command: ["mongod", "--shardsvr", "--replSet", "shard2rs", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27020:27018"
    volumes:
      - ./mongo-data/shard2:/data/db

  mongos:
    image: mongo:7.0
    container_name: nosql-mongos
    depends_on:
      - configsvr
      - shard1
      - shard2
    command:
      [
        "mongos",
        "--configdb",
        "cfgrs/configsvr:27019",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    ports:
      - "27017:27017"

  mongo-setup:
    image: mongo:7.0
    container_name: nosql-setup
    depends_on:
      - configsvr
      - shard1
      - shard2
      - mongos
    volumes:
      - ./scripts/init-cluster.sh:/scripts/init-cluster.sh:ro
    entrypoint: ["/bin/bash", "/scripts/init-cluster.sh"]
